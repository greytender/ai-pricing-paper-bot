name: Auto Fetch Literature

on:
  schedule:
    # 每天凌晨 0:00 自动在云端偷偷运行一次 (全球标准时间 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许你在网页上随时点击按钮“手动立刻触发”，方便我们现在进行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v3

    - name: 准备 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装运行依赖
      run: |
        pip install requests

    - name: 执行抓取脚本
      env:
        ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
        ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
        COLLECTION_ID: ${{ secrets.COLLECTION_ID }}
        SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }} # 将 SS 钥匙也传入运行环境
      run: python fetch_papers.py
